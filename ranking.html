<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ranking - Colombo Night Wolves</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/ranking.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<header class="header">
<div class="header-content">
<h1>🐺 Colombo Night Wolves</h1>
<nav class="nav">
<a href="dashboard.html">Dashboard</a>
<a href="jogadores.html">Jogadores</a>
<a href="partidas.html">Partidas</a>
<a href="ranking.html" class="active">Ranking</a>
<a href="admin.html">Admin</a>
<button onclick="logout()">Sair</button>
</nav>
</div>
</header>

<main class="container">

<div class="page-header">
<h2>⭐ Ranking de Jogadores</h2>
</div>

<div class="rankings-container">

<section class="ranking-card">
<h3>🎯 Artilheiros</h3>
<table class="ranking-table">
<thead>
<tr>
<th>Pos</th>
<th>Jogador</th>
<th>Gols</th>
<th>Partidas</th>
</tr>
</thead>
<tbody id="rankingGols">
</tbody>
</table>
</section>

<section class="ranking-card">
<h3>🤝 Maiores Assistentes</h3>
<table class="ranking-table">
<thead>
<tr>
<th>Pos</th>
<th>Jogador</th>
<th>Assistências</th>
<th>Partidas</th>
</tr>
</thead>
<tbody id="rankingAssist">
</tbody>
</table>
</section>

<section class="ranking-card">
<h3>⭐ Melhor Avaliação</h3>
<table class="ranking-table">
<thead>
<tr>
<th>Pos</th>
<th>Jogador</th>
<th>Média</th>
<th>Partidas</th>
</tr>
</thead>
<tbody id="rankingNota">
</tbody>
</table>
</section>

<section class="ranking-card">
<h3>🔴 Mais Cartões</h3>
<table class="ranking-table">
<thead>
<tr>
<th>Pos</th>
<th>Jogador</th>
<th>Cartões</th>
<th>Partidas</th>
</tr>
</thead>
<tbody id="rankingCartoes">
</tbody>
</table>
</section>

</div>

</main>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/session.js"></script>
<script src="js/ranking.js"></script>

</body>

</html>
